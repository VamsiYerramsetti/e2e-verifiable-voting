{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg p-4 border-0">

            <h3 class="mb-4 text-center">🗳 Cast Your Vote</h3>

            <form method="POST">

                <div class="list-group">

                    <label class="list-group-item d-flex align-items-center">
                        <input class="form-check-input me-3" type="radio" name="candidate" value="A" required>
                        <div>
                            <strong>Candidate A</strong>
                            
                        </div>
                    </label>

                    <label class="list-group-item d-flex align-items-center">
                        <input class="form-check-input me-3" type="radio" name="candidate" value="B">
                        <div>
                            <strong>Candidate B</strong>
                            
                        </div>
                    </label>

                    <label class="list-group-item d-flex align-items-center">
                        <input class="form-check-input me-3" type="radio" name="candidate" value="C">
                        <div>
                            <strong>Candidate C</strong>
                            
                        </div>
                    </label>

                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-primary px-4 py-2">Submit Vote</button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
