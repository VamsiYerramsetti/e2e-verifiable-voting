{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Audit Dashboard</h2>

<div class="row">

    <div class="col-md-6">
        <div class="card p-3 shadow">
            <h5>Ledger Status</h5>
            {% if ledger_valid %}
                <span class="text-success">✔ Valid</span>
            {% else %}
                <span class="text-danger">❌ Tampered</span>
            {% endif %}
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3 shadow">
            <h5>Total Votes</h5>
            <h3>{{ total }}</h3>
        </div>
    </div>

</div>

<div class="card mt-4 p-4 shadow">
    <h5>Election Results</h5>
    <canvas id="voteChart"></canvas>
</div>

<script>
const ctx = document.getElementById('voteChart');

const voteData = {{ results | tojson }};

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['A', 'B', 'C'],
        datasets: [{
            label: 'Votes',
            data: voteData,
            borderWidth: 1
        }]
    }
});
</script>

{% endblock %}
