<!DOCTYPE html>
<html>
<head>
    <title>Voting Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            padding: 20px;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            margin: 15px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: #0d6efd;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🔐 Voting</h4>

    <a href="/"><i class="bi bi-house"></i> Dashboard</a>
    <a href="/vote"><i class="bi bi-check2-square"></i> Vote</a>
    <a href="/verify"><i class="bi bi-search"></i> Verify</a>
    <a href="/audit"><i class="bi bi-bar-chart"></i> Audit</a>
    <a href="/attack"><i class="bi bi-exclamation-triangle"></i> Attack</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
