{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Dashboard Overview</h2>

<div class="row">

    <div class="col-md-4">
        <div class="card shadow p-3 text-center">
            <h5>Total Votes</h5>
            <h2>{{ total }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-3 text-center">
            <h5>Ledger Status</h5>
            {% if ledger_valid %}
                <h4 class="text-success">✔ Valid</h4>
            {% else %}
                <h4 class="text-danger">❌ Tampered</h4>
            {% endif %}
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-3 text-center">
            <h5>System Security</h5>
            {% if ledger_valid %}
                <h4 class="text-success">Secure</h4>
            {% else %}
                <h4 class="text-danger">Under Attack</h4>
            {% endif %}
        </div>
    </div>

</div>

{% endblock %}
